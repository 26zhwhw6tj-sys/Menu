<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Semanal + IA Avanzada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        :root {
            --primary: #ffffff;
            --secondary: #f0f0f0;
            --accent: #4cc9f0;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
            --gray: #6c757d;
            --border: rgba(255, 255, 255, 0.2);
            --transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            background: linear-gradient(135deg, #ffe0cd, #ffc2a1, #ffbe97);
            background-size: 300% 300%;
            animation: gradientAnimation 15s ease infinite;
            min-height: 100vh;
            padding: 0;
            overflow: hidden;
            color: var(--dark);
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .launcher {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .launcher.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .app-container.visible {
            opacity: 1;
        }

        .app-header {
            background: #000000;
            color: white;
            padding: 20px 15px 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .day-name {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 220px; /* Espacio para el contenedor de IA avanzada */
        }

        .day-content {
            display: none;
            opacity: 0;
            transform: translateX(50px);
            transition: var(--transition);
            padding-bottom: 30px;
        }

        .day-content.active {
            display: block;
            opacity: 1;
            transform: translateX(0);
            z-index: 2;
        }

        .day-content.prev {
            transform: translateX(-100%);
            opacity: 0;
            z-index: 1;
        }

        .day-content.next {
            transform: translateX(100%);
            opacity: 0;
            z-index: 1;
        }

        .meal-section {
            margin-bottom: 20px;
            animation: slideInUp 0.7s ease-out;
            animation-fill-mode: both;
        }

        .meal-section:nth-child(1) {
            animation-delay: 0.1s;
        }

        .meal-section:nth-child(2) {
            animation-delay: 0.2s;
        }

        .meal-section:nth-child(3) {
            animation-delay: 0.3s;
        }

        .meal-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meal-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 1.1rem;
            resize: none;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            backdrop-filter: blur(5px);
            line-height: 1.5;
        }

        .meal-input:focus {
            outline: none;
            border-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.95);
        }

        /* Contenedor de IA avanzada */
        .ai-advanced-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding: 15px;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            max-height: 250px;
            overflow-y: auto;
        }

        .ai-advanced-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .ai-advanced-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-advanced-controls {
            display: flex;
            gap: 8px;
        }

        .ai-advanced-btn {
            background: #4cc9f0;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-advanced-btn:hover {
            background: #3bb8e0;
            transform: scale(1.05);
        }

        .ai-advanced-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .ai-advanced-content {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #333;
        }

        .ai-advanced-loading {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: #666;
            padding: 10px;
        }

        .ai-advanced-consejo {
            background: rgba(76, 201, 240, 0.1);
            border-left: 4px solid #4cc9f0;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .ai-advanced-warning {
            background: rgba(255, 152, 0, 0.1);
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .ai-advanced-danger {
            background: rgba(244, 67, 54, 0.1);
            border-left: 4px solid #f44336;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .ai-advanced-success {
            background: rgba(76, 175, 80, 0.1);
            border-left: 4px solid #4caf50;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .ai-advanced-info {
            background: rgba(33, 150, 243, 0.1);
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .ai-advanced-stats {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 0.85rem;
        }

        .ai-advanced-stat {
            text-align: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            flex: 1;
        }

        .ai-advanced-stat-value {
            font-weight: bold;
            font-size: 1.1rem;
            color: #4cc9f0;
        }

        .ai-advanced-ordenado {
            background: rgba(76, 201, 240, 0.05);
            border: 1px dashed #4cc9f0;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .ai-advanced-ordenado-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-advanced-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .ai-advanced-item:last-child {
            border-bottom: none;
        }

        .ai-advanced-item-icon {
            font-size: 1.2rem;
        }

        .ai-advanced-item-text {
            flex: 1;
        }

        .ai-advanced-correction {
            background: rgba(255, 235, 59, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            text-decoration: line-through;
            font-size: 0.85rem;
        }

        .ai-advanced-correction-suggestion {
            background: rgba(76, 175, 80, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-left: 5px;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .day-name {
                font-size: 1.6rem;
            }
            
            .meal-title {
                font-size: 1.1rem;
            }
            
            .meal-input {
                min-height: 90px;
                padding: 12px;
            }
            
            .ai-advanced-container {
                padding: 12px;
            }
            
            .ai-advanced-title {
                font-size: 1.1rem;
            }
            
            .ai-advanced-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const launcher = document.getElementById('launcher');
            const loadingProgress = document.getElementById('loading-progress');
            const appContainer = document.getElementById('app-container');
            
            let progress = 0;
            let stallPoints = [];
            let speeds = [];
            
            for(let i = 0; i < 360; i++) {
                speeds.push(Math.random() * 10 + 1);
            }
            
            const stallCount = Math.floor(Math.random() * 5) + 3;
            for(let i = 0; i < stallCount; i++) {
                stallPoints.push(Math.random() * 90);
            }
            
            let speedIndex = 0;
            
            function updateProgress() {
                let isStalling = false;
                for(let i = 0; i < stallPoints.length; i++) {
                    if (stallPoints[i] > 0 && Math.abs(progress - stallPoints[i]) < 1) {
                        stallPoints[i] = -stallPoints[i];
                        isStalling = true;
                        const stallDuration = Math.random() * 800 + 200;
                        
                        setTimeout(() => {
                            updateProgress();
                        }, stallDuration);
                        
                        return;
                    }
                }
                
                const currentSpeed = speeds[speedIndex] || (Math.random() * 3 + 0.5);
                speedIndex = (speedIndex + 1) % speeds.length;
                
                progress += currentSpeed * 0.3;
                
                if (progress >= 100) {
                    progress = 100;
                    loadingProgress.style.width = '100%';
                    
                    setTimeout(() => {
                        launcher.classList.add('hidden');
                        appContainer.classList.add('visible');
                        initApp();
                    }, 300);
                    
                    return;
                }
                
                loadingProgress.style.width = `${progress}%`;
                requestAnimationFrame(updateProgress);
            }
            
            requestAnimationFrame(updateProgress);
        });

        function initApp() {
            const dayContents = document.querySelectorAll('.day-content');
            const textareas = document.querySelectorAll('.autosize');
            const currentDayElement = document.getElementById('currentDay');
            const mainContent = document.querySelector('.main-content');
            const aiContent = document.getElementById('ai-content');
            const aiRefresh = document.getElementById('ai-refresh');
            const aiNextConsejo = document.getElementById('ai-next-consejo');
            
            const days = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
            const dayNames = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
            let currentDayIndex = 0;
            let consejoIndex = 0;
            
            // Cargar datos y mostrar IA inicial
            loadMenu();
            setTimeout(updateAIContent, 1000);
            
            let touchStartX = 0;
            let touchEndX = 0;
            let touchStartY = 0;
            let touchEndY = 0;
            
            mainContent.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, false);
            
            mainContent.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, false);
            
            function handleSwipe() {
                const swipeThreshold = 50;
                const verticalThreshold = 30;
                
                const horizontalDistance = Math.abs(touchStartX - touchEndX);
                const verticalDistance = Math.abs(touchStartY - touchEndY);
                
                if (horizontalDistance > verticalDistance && horizontalDistance > swipeThreshold) {
                    if (touchStartX - touchEndX > swipeThreshold) {
                        nextDay();
                    } else if (touchEndX - touchStartX > swipeThreshold) {
                        prevDay();
                    }
                }
            }
            
            function nextDay() {
                const nextIndex = (currentDayIndex + 1) % days.length;
                switchDay(nextIndex);
            }
            
            function prevDay() {
                const prevIndex = (currentDayIndex - 1 + days.length) % days.length;
                switchDay(prevIndex);
            }
            
            function switchDay(newIndex) {
                const direction = newIndex > currentDayIndex ? 'next' : 'prev';
                
                dayContents[currentDayIndex].classList.remove('active');
                dayContents[currentDayIndex].classList.add(direction);
                
                dayContents[newIndex].classList.remove('prev', 'next');
                dayContents[newIndex].classList.add('active');
                
                currentDayElement.textContent = dayNames[newIndex];
                
                mainContent.scrollTop = 0;
                
                setTimeout(adjustTextareaHeights, 100);
                
                currentDayIndex = newIndex;
            }
            
            function adjustTextareaHeights() {
                textareas.forEach(textarea => {
                    textarea.style.height = 'auto';
                    textarea.style.height = (textarea.scrollHeight) + 'px';
                });
            }
            
            function saveMenu() {
                const menu = {};
                days.forEach(day => {
                    menu[day] = {
                        desayuno: document.getElementById(`${day}-desayuno`).value,
                        almuerzo: document.getElementById(`${day}-almuerzo`).value,
                        cena: document.getElementById(`${day}-cena`).value
                    };
                });
                localStorage.setItem('menuSemanal', JSON.stringify(menu));
                
                // Actualizar IA después de guardar
                setTimeout(updateAIContent, 500);
            }
            
            function loadMenu() {
                const savedMenu = localStorage.getItem('menuSemanal');
                if (savedMenu) {
                    const menu = JSON.parse(savedMenu);
                    days.forEach(day => {
                        if (menu[day]) {
                            document.getElementById(`${day}-desayuno`).value = menu[day].desayuno || '';
                            document.getElementById(`${day}-almuerzo`).value = menu[day].almuerzo || '';
                            document.getElementById(`${day}-cena`).value = menu[day].cena || '';
                        }
                    });
                    
                    setTimeout(adjustTextareaHeights, 100);
                }
            }
            
            // Función avanzada para actualizar el contenido de la IA
            async function updateAIContent() {
                try {
                    aiRefresh.disabled = true;
                    aiNextConsejo.disabled = true;
                    
                    // Cargar datos del menú
                    const menuData = JSON.parse(localStorage.getItem('menuSemanal') || '{}');
                    let allText = '';
                    let meals = [];
                    
                    // Recopilar todo el texto del menú y estructurar comidas
                    Object.entries(menuData).forEach(([day, mealsData]) => {
                        Object.entries(mealsData).forEach(([mealType, content]) => {
                            if (content) {
                                allText += content + ' ';
                                meals.push({
                                    day: day,
                                    type: mealType,
                                    content: content
                                });
                            }
                        });
                    });
                    
                    if (!allText.trim()) {
                        aiContent.innerHTML = `
                            <div class="ai-advanced-info">
                                <i class="fas fa-info-circle"></i> 
                                Guarda tus menús y la IA te dará consejos profesionales personalizados...
                            </div>
                        `;
                        return;
                    }
                    
                    // Generar análisis avanzado
                    const analisis = await generarAnalisisAvanzado(allText, meals);
                    mostrarAnalisis(analisis);
                    
                } catch (error) {
                    console.error('Error en IA:', error);
                    aiContent.innerHTML = `
                        <div class="ai-advanced-danger">
                            <i class="fas fa-exclamation-triangle"></i> 
                            Error al generar análisis. Completa más información en tus menús.
                        </div>
                    `;
                } finally {
                    aiRefresh.disabled = false;
                    aiNextConsejo.disabled = false;
                }
            }
            
            // Función para generar análisis avanzado
            function generarAnalisisAvanzado(texto, meals) {
                const palabras = texto.toLowerCase().split(/\s+/);
                const conteoPalabras = {};
                
                // Contar palabras importantes
                palabras.forEach(palabra => {
                    if (palabra.length > 3) {
                        conteoPalabras[palabra] = (conteoPalabras[palabra] || 0) + 1;
                    }
                });
                
                // Ordenar por frecuencia
                const palabrasFrecuentes = Object.entries(conteoPalabras)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10)
                    .map(([palabra]) => palabra);
                
                // Análisis de nutrientes
                const nutrientes = {
                    verduras: palabrasFrecuentes.filter(p => 
                        ['verdura', 'verduras', 'ensalada', 'lechuga', 'tomate', 'pepino', 'zanahoria', 'espinaca'].includes(p)
                    ).length,
                    frutas: palabrasFrecuentes.filter(p => 
                        ['fruta', 'frutas', 'manzana', 'plátano', 'naranja', 'uva', 'fresa'].includes(p)
                    ).length,
                    proteinas: palabrasFrecuentes.filter(p => 
                        ['carne', 'pollo', 'pescado', 'huevo', 'huevos', 'tofu', 'lentejas', 'frijoles'].includes(p)
                    ).length,
                    carbohidratos: palabrasFrecuentes.filter(p => 
                        ['arroz', 'pasta', 'pan', 'patata', 'patatas', 'maíz'].includes(p)
                    ).length
                };
                
                // Análisis de hábitos
                const habitos = {
                    equilibrado: nutrientes.verduras > 2 && nutrientes.frutas > 1 && nutrientes.proteinas > 1,
                    altoCalorias: palabrasFrecuentes.some(p => 
                        ['frito', 'fritas', 'pizza', 'hamburguesa', 'dulce', 'azúcar', 'chocolate'].includes(p)
                    ),
                    bajoVerduras: nutrientes.verduras < 2,
                    repetitivo: palabrasFrecuentes.some((p, i) => 
                        i < palabrasFrecuentes.length - 2 && 
                        p === palabrasFrecuentes[i+1] && 
                        p === palabrasFrecuentes[i+2]
                    )
                };
                
                // Corrección ortográfica básica (simulada)
                const correcciones = [];
                meals.forEach(meal => {
                    // Simular correcciones ortográficas comunes
                    const contenido = meal.content;
                    if (contenido.includes('tomate') && contenido.includes('ensalda')) {
                        correcciones.push({
                            original: 'ensalda',
                            corregido: 'ensalada',
                            contexto: `En ${meal.day} ${meal.type}`
                        });
                    }
                });
                
                // Organización visual de comidas
                const comidasOrganizadas = meals.map(meal => {
                    const items = meal.content.split(/[,.]/).filter(item => item.trim());
                    return {
                        dia: meal.day,
                        tipo: meal.type,
                        items: items.map(item => item.trim())
                    };
                });
                
                return {
                    nutrientes,
                    habitos,
                    correcciones,
                    comidasOrganizadas,
                    palabrasFrecuentes
                };
            }
            
            // Función para mostrar el análisis
            function mostrarAnalisis(analisis) {
                const consejos = [];
                
                // Consejos basados en nutrientes
                if (analisis.nutrientes.verduras < 3) {
                    consejos.push({
                        tipo: 'warning',
                        mensaje: '🥗 Te recomiendo incluir más verduras en tus comidas. Prueba con espinacas, brócoli o zanahorias.'
                    });
                } else {
                    consejos.push({
                        tipo: 'success',
                        mensaje: '✅ ¡Excelente! Incluyes suficientes vegetales en tu dieta.'
                    });
                }
                
                if (analisis.nutrientes.frutas < 2) {
                    consejos.push({
                        tipo: 'warning',
                        mensaje: '🍎 Considera añadir frutas frescas a tu menú. Las frutas son una gran fuente de vitaminas.'
                    });
                } else {
                    consejos.push({
                        tipo: 'success',
                        mensaje: '✅ ¡Perfecto! Las frutas son una gran fuente de vitaminas.'
                    });
                }
                
                if (analisis.nutrientes.proteinas < 2) {
                    consejos.push({
                        tipo: 'warning',
                        mensaje: '🥩 Te sugerimos agregar fuentes de proteína como carnes magras, pescado o legumbres.'
                    });
                } else {
                    consejos.push({
                        tipo: 'success',
                        mensaje: '✅ Bien por incluir proteínas en tu dieta.'
                    });
                }
                
                // Alertas de hábitos
                if (analisis.habitos.altoCalorias) {
                    consejos.push({
                        tipo: 'danger',
                        mensaje: '⚠️ Cuidado con las comidas altas en calorías. Considera opciones más saludables como asados o al vapor.'
                    });
                }
                
                if (analisis.habitos.repetitivo) {
                    consejos.push({
                        tipo: 'info',
                        mensaje: '🔄 Tu menú parece repetitivo. Prueba con nuevas recetas para una dieta más variada.'
                    });
                }
                
                // Mostrar correcciones ortográficas
                if (analisis.correcciones.length > 0) {
                    consejos.push({
                        tipo: 'info',
                        mensaje: `✍️ Correcciones ortográficas encontradas: ${analisis.correcciones.length}`
                    });
                }
                
                // Mostrar consejo actual
                const consejoActual = consejos[consejoIndex % consejos.length];
                
                let html = '';
                
                // Estadísticas
                html += `
                    <div class="ai-advanced-stats">
                        <div class="ai-advanced-stat">
                            <div class="ai-advanced-stat-value">${analisis.nutrientes.verduras}</div>
                            <div>Verduras</div>
                        </div>
                        <div class="ai-advanced-stat">
                            <div class="ai-advanced-stat-value">${analisis.nutrientes.frutas}</div>
                            <div>Frutas</div>
                        </div>
                        <div class="ai-advanced-stat">
                            <div class="ai-advanced-stat-value">${analisis.nutrientes.proteinas}</div>
                            <div>Proteínas</div>
                        </div>
                        <div class="ai-advanced-stat">
                            <div class="ai-advanced-stat-value">${analisis.correcciones.length}</div>
                            <div>Correcciones</div>
                        </div>
                    </div>
                `;
                
                // Consejo actual
                const claseConsejo = `ai-advanced-${consejoActual.tipo}`;
                html += `<div class="${claseConsejo}">${consejoActual.mensaje}</div>`;
                
                // Correcciones ortográficas
                if (analisis.correcciones.length > 0) {
                    html += `
                        <div class="ai-advanced-ordenado">
                            <div class="ai-advanced-ordenado-title">
                                <i class="fas fa-spell-check"></i>
                                Correcciones Ortográficas
                            </div>
                    `;
                    analisis.correcciones.forEach(correccion => {
                        html += `
                            <div class="ai-advanced-item">
                                <div class="ai-advanced-item-icon">✍️</div>
                                <div class="ai-advanced-item-text">
                                    <span class="ai-advanced-correction">${correccion.original}</span>
                                    <span class="ai-advanced-correction-suggestion">${correccion.corregido}</span>
                                    <br><small>${correccion.contexto}</small>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                
                // Organización visual
                html += `
                    <div class="ai-advanced-ordenado">
                        <div class="ai-advanced-ordenado-title">
                            <i class="fas fa-list"></i>
                            Menú Organizado Visualmente
                        </div>
                `;
                
                analisis.comidasOrganizadas.forEach(comida => {
                    html += `
                        <div class="ai-advanced-item">
                            <div class="ai-advanced-item-icon">📅</div>
                            <div class="ai-advanced-item-text">
                                <strong>${comida.dia.charAt(0).toUpperCase() + comida.dia.slice(1)} - ${comida.tipo}</strong>
                                <div style="margin-top: 5px;">
                    `;
                    
                    comida.items.forEach((item, index) => {
                        html += `
                            <div style="display: flex; align-items: center; margin: 3px 0;">
                                <span style="margin-right: 8px;">→</span>
                                <span>${item}</span>
                            </div>
                        `;
                    });
                    
                    html += `
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
                
                aiContent.innerHTML = html;
            }
            
            // Eventos para los botones
            aiRefresh.addEventListener('click', updateAIContent);
            
            aiNextConsejo.addEventListener('click', () => {
                consejoIndex++;
                updateAIContent();
            });
            
            // Corrección ortográfica en tiempo real (simulada)
            textareas.forEach(textarea => {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                    
                    clearTimeout(this.saveTimeout);
                    this.saveTimeout = setTimeout(saveMenu, 1000);
                });
                
                textarea.style.height = 'auto';
                textarea.style.height = (textarea.scrollHeight) + 'px';
            });
        }
    </script>
</body>
</html>
